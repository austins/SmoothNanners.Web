name: Set up environment
runs:
    using: "composite"
    steps:
        -   name: Cache libman assets
            uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
            with:
                path: ~/.local/share/.librarymanager/cache
                key: ${{ runner.os }}-libman-${{ hashFiles('./src/**/libman.json') }}
