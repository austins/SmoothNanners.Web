name: Set up environment
runs:
    using: "composite"
    steps:
        -   name: Set up .NET Core SDK
            uses: actions/setup-dotnet@v4
            with:
                dotnet-version: '9.x'
        -   name: Set up pnpm
            uses: pnpm/action-setup@v4
            working-directory: ./src/SmoothNanners.Web
        -   name: Install Node.js
            uses: actions/setup-node@v4
            working-directory: ./src/SmoothNanners.Web
            with:
                node-version: '24.x'
                cache: 'pnpm'
