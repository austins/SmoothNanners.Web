name: Test

on: [ workflow_call, workflow_dispatch ]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
        steps:
            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   uses: ./.github/actions/setup-environment
            -   name: Get Playwright version
                id: playwright-version
                run: |
                    VERSION=$(dotnet package list --project ./tests/SmoothNanners.Web.Tests.E2E --format json 2>/dev/null | jq -r '.projects[0].frameworks[0].topLevelPackages[] | select(.id == "Microsoft.Playwright.TestAdapter") | .resolvedVersion')
                    if [ -z "$VERSION" ]; then
                        echo "Error: could not determine Playwright version"
                        exit 1
                    fi
                    echo "Resolved Playwright version: $VERSION"
                    echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            -   name: Cache Playwright browsers
                uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
                with:
                    path: ~/.cache/ms-playwright
                    key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
            -   name: Restore dependencies
                run: dotnet restore --locked-mode
            -   name: Cache Libman assets
                uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
                with:
                    path: ~/.local/share/.librarymanager/cache
                    key: ${{ runner.os }}-libman-${{ hashFiles('**/libman.json') }}
            -   name: Test
                run: dotnet test --no-restore -c Release --results-directory ./test-results -- --report-ctrf
            -   if: always()
                name: Publish test report
                uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700 # v1.1.0
                with:
                    report-path: ./test-results/*.ctrf
                    summary-report: true
                    file-report: true
                    failed-folded-report: true
                    skipped-report: true
